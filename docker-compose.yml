services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-budget}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-budget_app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-budget} -d ${POSTGRES_DB:-budget_app}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local LLM — all AI processing stays on your machine.
  # On first start, run: docker compose exec ollama ollama pull qwen2.5:7b
  # GPU acceleration is enabled automatically if your system supports it.
  # To disable, remove the 'ollama' service and set OLLAMA_URL="" in .env
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment the following for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-budget}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-budget_app}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-budget}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-budget_app}
      SIMPLEFIN_ACCESS_URL: ${SIMPLEFIN_ACCESS_URL:-}
      SECRET_KEY: ${SECRET_KEY}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      # Shared rate-limit / lockout state (optional). When unset, falls back
      # to per-instance in-memory storage.
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      # IP/CIDR allowlist for proxies permitted to set X-Forwarded-For.
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    environment:
      # Backend URL for Next.js rewrites (proxy /api to backend)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
      # Tell next.config to use backend:8000 (not localhost) for rewrites when in Docker
      NEXT_PUBLIC_API_DOCKER: "1"
      # App URL for server-side API calls (frontend container calls itself on port 3000)
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://frontend:3000}
    ports:
      - "3001:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  ollama_data:
  caddy_data:
  caddy_config:
