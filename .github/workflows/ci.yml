name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest / audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install pip-audit
      # Starlette 0.52.1 (via FastAPI) — PYSEC-2026-161 has no 0.52.x fix yet.
      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2026-161
      - name: Run pytest
        run: python -m pytest tests/ -v

  frontend:
    name: Frontend (lint / test / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Dependency audit (npm)
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Static analysis (fallow)
        run: npm run quality:static
      - name: Unit tests
        run: npm run test:run
      - name: Build
        run: npm run build
