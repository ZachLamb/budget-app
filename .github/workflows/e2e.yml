name: E2E (smoke)

# PRs (path-filtered to app code), nightly, and manual. Path filtering keeps
# doc/config-only PRs fast; the smoke spec is the browser-level regression
# gate that unit suites can't provide. (Scheduled runs use the default branch.)
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "frontend/src/**"
      - "frontend/e2e/**"
      - "frontend/package-lock.json"
      - "backend/app/**"
      - "docker-compose.yml"
      - ".env.demo"
  schedule:
    - cron: "0 6 * * *"

jobs:
  e2e:
    name: Playwright smoke
    # No secrets are used here (.env.demo is committed), but building and
    # running arbitrary fork code on the runner is still not worth enabling:
    # PR runs are restricted to same-repo branches. Fork PRs get covered by
    # the nightly run after merge.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # npm ci must run before `docker compose up`: the frontend service
      # bind-mounts ./frontend with an anonymous /app/node_modules volume,
      # and if the host node_modules doesn't exist yet Docker creates the
      # mountpoint as root — the later npm ci then fails with EACCES.
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Seed demo env
        # docker compose reads `.env` by default. `.env.demo` is the
        # committed, safe set of values for a throwaway demo stack.
        run: cp .env.demo .env

      - name: Bring up stack (postgres + backend + frontend)
        # Skip the `ollama` and `caddy` services — the demo doesn't need
        # a local LLM (it returns canned responses) and Caddy's TLS
        # cert bootstrap is unnecessary for smoke tests.
        run: docker compose up -d --build postgres backend frontend

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/api/health > /dev/null; then
              echo "backend up"; exit 0
            fi
            sleep 5
          done
          echo "backend did not come up in time"
          docker compose logs backend
          exit 1

      - name: Wait for frontend
        # The frontend container runs `npm run dev` and can take a
        # minute to compile on a cold build. Poll until it answers.
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3001/login > /dev/null; then
              echo "frontend up"; exit 0
            fi
            sleep 5
          done
          echo "frontend did not come up in time"
          docker compose logs frontend backend
          exit 1

      - name: Run e2e
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --no-color > compose-logs.txt || true

      - name: Upload service logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: compose-logs
          path: compose-logs.txt
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose down -v
