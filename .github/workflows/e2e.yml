name: E2E (smoke)

# Manually triggered for now — e2e in every PR is expensive and we don't
# want flakes blocking merges. Graduate to `pull_request` when the suite
# has proven reliable.
on:
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Seed demo env
        # docker compose reads `.env` by default. `.env.demo` is the
        # committed, safe set of values for a throwaway demo stack.
        run: cp .env.demo .env

      - name: Bring up stack (postgres + backend + frontend)
        # Skip the `ollama` and `caddy` services — the demo doesn't need
        # a local LLM (it returns canned responses) and Caddy's TLS
        # cert bootstrap is unnecessary for smoke tests.
        run: docker compose up -d --build postgres backend frontend

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/api/health > /dev/null; then
              echo "backend up"; exit 0
            fi
            sleep 5
          done
          echo "backend did not come up in time"
          docker compose logs backend
          exit 1

      - name: Wait for frontend
        # The frontend container runs `npm run dev` and can take a
        # minute to compile on a cold build. Poll until it answers.
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3001/login > /dev/null; then
              echo "frontend up"; exit 0
            fi
            sleep 5
          done
          echo "frontend did not come up in time"
          docker compose logs frontend backend
          exit 1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --no-color > compose-logs.txt || true

      - name: Upload service logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: compose-logs
          path: compose-logs.txt
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose down -v
