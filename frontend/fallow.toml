# fallow.toml — CI runs `fallow dead-code` (hard fail on errors).
# Full `fallow` (dupes/health) is for periodic audits via code-quality-audit skill.
# https://docs.fallow.tools

entry = ["public/sw.js"]

ignoreExportsUsedInFile = true

[[ignoreExports]]
file = "src/components/ui/**"
exports = ["*"]

[rules]
unused-files = "error"
unused-exports = "error"
unused-types = "error"
unlisted-dependencies = "error"
duplicate-exports = "error"
unused-dependencies = "warn"

[duplicates]
enabled = false

[health]
maxCyclomatic = 999
maxCognitive = 999
