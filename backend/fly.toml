# Fly.io app config for the Clarity FastAPI backend.
#
# Postgres is provisioned separately (``fly postgres create``) and attached
# via ``fly postgres attach`` — that sets ``DATABASE_URL`` as a secret on
# this app. All other secrets (SECRET_KEY, CORS_ORIGINS, TRUSTED_PROXIES,
# UPSTASH_REDIS_REST_* or KV_REST_API_*, LLM_BACKEND_*, etc.) are set via
# ``fly secrets set``. See docs/deployment-security-checklist.md.
#
# Build comes from ``backend/Dockerfile`` (this file lives next to it).
# The Dockerfile's ENTRYPOINT runs ``alembic upgrade head`` before uvicorn,
# so prod migrations apply automatically on every deploy.

app = "clarity-backend"
primary_region = "iad"

[build]
  # No special args; Dockerfile is auto-detected.

[http_service]
  internal_port = 8000
  force_https = true
  # Keep one machine warm: passkey/OAuth challenges and rate-limit state fall
  # back to per-machine memory while the shared Upstash store is being
  # reprovisioned (docs/deployment-security-checklist.md). Scale-to-zero can
  # return once Upstash is healthy, at the cost of ~5–10s cold starts.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
